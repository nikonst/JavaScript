<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Painters Player</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .carousel-image {
            width: 100%;
            height: 420px;
            /* σταθερό ύψος */
            object-fit: cover;
            /* crop χωρίς παραμόρφωση */
            border-radius: 8px;
            border: 2px solid #444;
        }

        .btn-outline-warning.active,
        .btn-outline-warning:focus {
            color: #f7eded;
            background-color: #dc3545;
            border-color: #dc3545;
        }

        #loadingSpinner {
            position: absolute;
            z-index: 2;
        }

        #errorMessage {
            position: absolute;
            z-index: 2;
        }
    </style>
</head>

<body class="text-light min-vh-100 d-flex flex-column justify-content-center py-5">

    <div class="container text-center">

        <h1 class="mb-4 fw-bold text-danger">Masters of Art</h1>
        <p class="mb-5" style="color: #9c0808;">
            Επίλεξε ζωγράφο και περιηγήσου στα έργα του
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">
            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('renoir', this)">
                Pierre-Auguste Renoir
            </button>

            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('vanGogh', this)">
                Vincent van Gogh
            </button>

            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('gauguin', this)">
                Paul Gauguin
            </button>

            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('cezanne', this)">
                Cezanne
            </button>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-12">
                <div
                    class="ratio ratio-16x9 shadow-lg rounded border border-secondary overflow-hidden video-container d-flex align-items-center justify-content-center">

                    <!-- Loading spinner -->
                    <div id="loadingSpinner" class="text-secondary d-none">
                        <div class="spinner-border text-warning" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <div id="carouselPlaceholder" class="text-secondary p-4 w-100 text-center">
                        <p class="fs-5 m-0">Επίλεξε έναν ζωγράφο για να δεις τους πίνακές του</p>
                    </div>

                    <div id="carouselContainer" style="width:100%; text-align:center;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const IMAGES = {
            vanGogh: [
                "./imgs/vanGogh/vanGogh1.webp",
                "./imgs/vanGogh/vanGogh2.webp",
                "./imgs/vanGogh/vanGogh3.webp"
            ],
            renoir: [
                "./imgs/renoir/renoir1.webp",
                "./imgs/renoir/renoir2.webp",
                "./imgs/renoir/renoir3.webp"
            ],
            gauguin: [
                "./imgs/gauguin/gauguin1.webp",
                "./imgs/gauguin/gauguin2.webp",
                "./imgs/gauguin/gauguin3.webp"
            ],
            cezanne: [
                "./imgs/cezanne/cezanne1.webp",
                "./imgs/cezanne/cezanne2.webp",
                "./imgs/cezanne/cezanne3.webp"
            ]

        };

        function playVideo(painter, buttonElement) {
            const placeholder = document.getElementById('carouselPlaceholder');
            placeholder.style.display = 'none';

            const carousel = document.getElementById('carouselContainer');

            const images = IMAGES[painter];
            // console.log(painter)
            // console.log(images)
            let html = `
                <div id="simpleCarousel" class="position-relative mx-auto" style="max-width: 800px;">
                    <img id="carouselImage" src="${images[0]}" class="carousel-image">

                    <button class="btn btn-warning position-absolute top-50 start-0 translate-middle-y"
                        onclick="prevImage('${painter}')">‹</button>

                    <button class="btn btn-warning position-absolute top-50 end-0 translate-middle-y"
                        onclick="nextImage('${painter}')">›</button>
                </div>
                `;

            carousel.innerHTML = html;

            document.querySelectorAll('.btn-outline-warning').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            window.currentIndex = 0;
            window.currentPainter = painter;
        }

        function prevImage(painter) {
            const imgs = IMAGES[painter];
            window.currentIndex = (window.currentIndex - 1 + imgs.length) % imgs.length;
            document.getElementById("carouselImage").src = imgs[window.currentIndex];
        }

        function nextImage(painter) {
            const imgs = IMAGES[painter];
            window.currentIndex = (window.currentIndex + 1) % imgs.length;
            document.getElementById("carouselImage").src = imgs[window.currentIndex];
        }
    </script>

</body>

</html>
