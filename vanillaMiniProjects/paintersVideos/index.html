<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Painters Biography Player</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .video-container {
            background-color: #1a1a1a;
            min-height: 200px;
            position: relative;
        }

        .btn-outline-warning.active,
        .btn-outline-warning:focus {
            color: #000;
            background-color: #ffc107;
            border-color: #ffc107;
        }

        #videoPlayer {
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        #videoPlayer.visible {
            opacity: 1;
        }

        #loadingSpinner {
            position: absolute;
            z-index: 2;
        }

        #errorMessage {
            position: absolute;
            z-index: 2;
        }
    </style>
</head>

<body class="bg-dark text-light min-vh-100 d-flex flex-column justify-content-center py-5">

    <div class="container text-center">

        <h1 class="mb-4 fw-bold text-warning">Masters of Art</h1>
        <p class="mb-5" style="color: #e8e8e8;">
            Επίλεξε έναν ζωγράφο για να εμφανιστεί στο κέντρο ένα εκπαιδευτικό βίντεο με τη βιογραφία του.
        </p>


        <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">
            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('oxHnRfhDmrk', this)">
                Vincent van Gogh
            </button>

            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('1T5vZXTmS6E', this)">
                Pierre-Auguste Renoir
            </button>

            <button class="btn btn-outline-warning btn-lg px-4 fw-semibold" onclick="playVideo('u1JgqS0bkkE', this)">
                Paul Gauguin
            </button>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-12">
                <div
                    class="ratio ratio-16x9 shadow-lg rounded border border-secondary overflow-hidden video-container d-flex align-items-center justify-content-center">

                    <!-- Loading spinner -->
                    <div id="loadingSpinner" class="text-secondary d-none">
                        <div class="spinner-border text-warning" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <!-- Error message -->
                    <div id="errorMessage" class="text-danger d-none">
                        <p class="m-0">Το βίντεο δεν μπορεί να αναπαραχθεί αυτή τη στιγμή.</p>
                    </div>

                    <!-- Placeholder -->
                    <div id="videoPlaceholder" class="text-secondary p-4 w-100 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor"
                            class="bi bi-play-btn mb-3" viewBox="0 0 16 16">
                            <path d="M6.79 5.093A.5.5 0 0 0 6 5.5v5a.5.5 0 0 0 .79.407l3.5-2.5a.5.5 0 0 0 0-.814z" />
                            <path
                                d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm15 0a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1z" />
                        </svg>
                        <p class="fs-5 m-0">Click a button above to watch the biography</p>
                    </div>

                    <!-- Iframe -->
                    <iframe id="videoPlayer" src="" title="Biography Video"
                        style="display: none; width: 100%; height: 100%; border: none;"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>

                </div>
            </div>
        </div>
    </div>

    <script>
        function playVideo(videoId, buttonElement) {
            const player = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            const spinner = document.getElementById('loadingSpinner');
            const errorMessage = document.getElementById('errorMessage');

            // reset UI
            errorMessage.classList.add('d-none');
            placeholder.style.display = 'none';
            player.style.display = 'none';
            player.classList.remove('visible');

            // δείξε spinner
            spinner.classList.remove('d-none');

            // αλλάζουμε src
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

            // όταν φορτώσει, κρύψε spinner και κάνε fade-in
            player.onload = () => {
                spinner.classList.add('d-none');
                player.style.display = 'block';
                player.classList.add('visible');
            };

            // active state στα κουμπιά
            document.querySelectorAll('.btn-outline-warning').forEach(btn => {
                btn.classList.remove('active');
            });
            buttonElement.classList.add('active');

            // προαιρετικό: timeout fallback αν κάτι δεν φορτώσει
            setTimeout(() => {
                if (player.style.display === 'none') {
                    spinner.classList.add('d-none');
                    errorMessage.classList.remove('d-none');
                }
            }, 5000);
        }
    </script>

</body>

</html>
