<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Mini Weather Widget</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="widget">
        <h2>Weather Widget</h2>

        <input id="cityInput" type="text" placeholder="Enter city..." />

        <button id="searchBtn">Search</button>

        <div id="weatherBox" class="weather hidden">
            <img id="icon" />
            <div>
                <h3 id="cityName"></h3>
                <p id="temp"></p>
                <p id="desc"></p>
            </div>
        </div>

        <p class="hint">Powered by Open‑Meteo</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
