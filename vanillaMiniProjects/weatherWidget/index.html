<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Mini Weather Widget</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="widget">
        <h2>Weather Widget</h2>

        <select id="citySelect">
            <option value="">Select a city...</option>
            <!-- JavaScript will insert the cities here -->
        </select>

        <div id="weatherBox" class="weather hidden">
            <div id="icon" class="icon"></div>
            <div>
                <h3 id="cityName"></h3>
                <p id="temp"></p>
                <p id="desc"></p>
            </div>
        </div>

        <p class="hint">Powered by Open‑Meteo</p>
    </div>
    <script src="script.js"></script>
    <script>

        const cities = [
            { code: "Athens", label: "[GR] Athens" },
            { code: "Rome", label: "[IT] Rome" },
            { code: "London", label: "[GB] London" },
            { code: "Paris", label: "[FR] Paris" },
            { code: "Madrid", label: "[ES] Madrid" },
            { code: "Berlin", label: "[DE] Berlin" },
            { code: "Lisbon", label: "[PT] Lisbon" },
            { code: "New York", label: "[US] New York" },
            { code: "San Francisco", label: "[US] San Francisco" },
            { code: "Los Angeles", label: "[US] Los Angeles" }
        ];

        const citySelect = document.getElementById('citySelect');

        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city.code;
            option.textContent = city.label;
            citySelect.appendChild(option);
        });

        citySelect.addEventListener('change', (event) => {
            const selectedCity = event.target.value;
            if (!selectedCity) return;

            console.log(`Ready to fetch weather for: ${selectedCity}`);
        });
    </script>
</body>

</html>
