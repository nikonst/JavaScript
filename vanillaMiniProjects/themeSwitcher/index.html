<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="card">
        <h1>Theme Switcher</h1>
        <p>Click the button below to toggle between light and dark modes.</p>

        <div class="theme-controls">
            <button id="theme-light" aria-label="Switch to light theme">Light</button>
            <button id="theme-dark" aria-label="Switch to dark theme">Dark</button>
            <button id="theme-red" aria-label="Switch to red theme">Red</button>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
