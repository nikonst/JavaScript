<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Password Generator</h1>

    <div class="output-row">
      <input id="passwordOutput" type="text" readonly />
      <button id="copyBtn">Copy</button>
    </div>

    <div class="control">
      <label for="lengthRange">
        Length: <span id="lengthValue">12</span>
      </label>
      <input
        type="range"
        id="lengthRange"
        min="4"
        max="32"
        value="12"
      />
    </div>

    <div class="control">
      <label>
        <input type="checkbox" id="lowercase" checked />
        Include lowercase
      </label>
    </div>

    <div class="control">
      <label>
        <input type="checkbox" id="uppercase" checked />
        Include uppercase
      </label>
    </div>

    <div class="control">
      <label>
        <input type="checkbox" id="numbers" checked />
        Include numbers
      </label>
    </div>

    <div class="control">
      <label>
        <input type="checkbox" id="symbols" />
        Include symbols
      </label>
    </div>

    <button id="generateBtn" class="primary">Generate Password</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
