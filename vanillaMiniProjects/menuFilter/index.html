<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Menu Filter (Bootstrap 5)</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* Clean custom tweaks alongside Bootstrap classes */
        .underline {
            width: 5rem;
            height: 0.25rem;
            background-color: #f38c32;
            margin: 0 auto;
        }

       /*  .item-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        } */

        @media screen and (min-width: 576px) {
            .item-img {
                width: 150px;
                height: 120px;
            }
        }

        .item-header {
            border-bottom: 1px dashed #6c757d;
        }
    </style>
</head>

<body class="bg-light py-5">

    <div class="container" style="max-width: 1100px;">
        <!-- Title Area -->
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-danger text-opacity-75 mb-2">Our Menu</h1>
            <div class="underline"></div>
        </header>

        <!-- Filter Buttons Container -->
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5" id="btn-container">
            <!-- Generated dynamically by JS -->
        </div>

        <!-- Menu Items Grid -->
        <main class="row g-4" id="menu-grid">
            <!-- Generated dynamically by JS -->
        </main>
    </div>

    <script src="./js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
