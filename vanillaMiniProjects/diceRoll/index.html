<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <!-- Bootstrap 5 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        /* Simple CSS dice styling */
        .dice {
            width: 100px;
            height: 100px;
            border: 3px solid #ac0606;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-5 rounded shadow-sm">
                
                <h1 class="mb-4 text-primary">Dice Roller</h1>
                
                <!-- Dice Container -->
                <div class="d-flex justify-content-center gap-4 mb-4">
                    <div id="dice1" class="dice text-dark">1</div>
                    <div id="dice2" class="dice text-dark">1</div>
                </div>
                
                <!-- Roll Button -->
                <button id="rollBtn" class="btn btn-primary btn-lg px-4 mb-4">Roll Dice</button>
                
                <!-- Result Display -->
                <div class="h3 text-secondary">
                    Total: <span id="totalResult" class="fw-bold text-success">2</span>
                </div>

            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        document.getElementById('rollBtn').addEventListener('click', function() {
            // Generate random numbers between 1 and 6
            const roll1 = Math.floor(Math.random() * 6) + 1;
            const roll2 = Math.floor(Math.random() * 6) + 1;
            
            // Calculate total
            const total = roll1 + roll2;
            
            // Update UI text
            document.getElementById('dice1').textContent = roll1;
            document.getElementById('dice2').textContent = roll2;
            document.getElementById('totalResult').textContent = total;
        });
    </script>

</body>
</html>
